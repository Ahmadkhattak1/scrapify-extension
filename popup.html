<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GBP Maps Scraper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>GBP Maps Scraper</h1>

      <section class="panel">
        <label>
          Max rows
          <input id="maxRows" type="number" min="1" step="1" value="200" />
        </label>
        <label class="checkbox">
          <input id="infiniteScroll" type="checkbox" />
          Infinite scroll (ignore max rows)
        </label>

        <div class="row">
          <label>
            Min rating
            <input id="minRating" type="number" min="0" max="5" step="0.1" placeholder="e.g. 4.2" />
          </label>
          <label>
            Max rating
            <input id="maxRating" type="number" min="0" max="5" step="0.1" placeholder="e.g. 4.8" />
          </label>
        </div>

        <div class="row">
          <label>
            Min reviews
            <input id="minReviews" type="number" min="0" step="1" placeholder="e.g. 50" />
          </label>
          <label>
            Max reviews
            <input id="maxReviews" type="number" min="0" step="1" placeholder="e.g. 500" />
          </label>
        </div>

        <div class="row toggles">
          <label class="checkbox">
            <input id="hasWebsite" type="checkbox" />
            Has website
          </label>
          <label class="checkbox">
            <input id="hasPhone" type="checkbox" />
            Has phone
          </label>
        </div>

        <label class="checkbox">
          <input id="enableEnrichment" type="checkbox" />
          Enrich websites
        </label>
        <label>
          Website pages per site (focused crawl)
          <input id="siteMaxPages" type="number" min="1" max="120" step="1" value="12" />
        </label>
        <label>
          Best email priority
          <select id="emailPreference">
            <option value="owner">Owner first (recommended)</option>
            <option value="primary">Best auto first</option>
            <option value="contact">Company first</option>
          </select>
        </label>
        <label>
          <span class="label-with-info">
            Email columns
            <span class="info-dot" title="Controls how many email columns are exported."></span>
          </span>
          <select id="emailOutputMode">
            <option value="unified_only">Only best email (recommended)</option>
            <option value="unified_plus_raw">Best email + owner/company</option>
            <option value="raw_only">Owner/company only</option>
          </select>
        </label>
        <p id="emailPreferenceHint" class="hint-text"></p>
        <p id="emailColumnsHint" class="hint-text"></p>
        <label>
          Best phone priority
          <select id="phonePreference">
            <option value="listing">Listing first (recommended)</option>
            <option value="website">Website first</option>
          </select>
        </label>
        <label>
          <span class="label-with-info">
            Phone columns
            <span class="info-dot" title="Controls how many phone columns are exported."></span>
          </span>
          <select id="phoneOutputMode">
            <option value="unified_only">Only best phone (recommended)</option>
            <option value="unified_plus_raw">Best phone + detailed fields</option>
            <option value="raw_only">Detailed fields only</option>
          </select>
        </label>
        <p id="phonePreferenceHint" class="hint-text"></p>
        <p id="phoneColumnsHint" class="hint-text"></p>
        <div class="row toggles">
          <label class="checkbox">
            <input id="showEnrichmentTabs" type="checkbox" />
            Show tabs while enriching
          </label>
          <label class="checkbox">
            <input id="scanSocialLinks" type="checkbox" checked />
            Hunt email on Facebook links
          </label>
        </div>
        <label class="checkbox">
          <input id="leadDiscoveryEnabled" type="checkbox" />
          Enable Google Search lead discovery
        </label>
        <label class="checkbox">
          <input id="discoveryGoogleEnabled" type="checkbox" checked />
          Google Search (top 3 results)
        </label>

        <section class="columns-block">
          <div class="columns-head">
            <strong id="columnsTitle">Export columns</strong>
            <div class="columns-actions">
              <button id="toggleAdvancedBtn" type="button" class="chip-btn">Advanced Off</button>
              <button id="columnsAllBtn" type="button" class="chip-btn">All</button>
              <button id="columnsNoneBtn" type="button" class="chip-btn">None</button>
            </div>
          </div>
          <div id="columnList" class="column-list"></div>
        </section>
      </section>

      <section class="actions">
        <button id="startBtn" class="primary">Start Scrape</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="exportBtn" disabled>Export CSV</button>
      </section>

      <section class="status panel">
        <div class="status-grid">
          <div><span>Processed</span><strong id="processed">0</strong></div>
          <div><span>Matched</span><strong id="matched">0</strong></div>
          <div><span>Duplicates</span><strong id="duplicates">0</strong></div>
          <div><span>Errors</span><strong id="errors">0</strong></div>
        </div>
        <div class="metrics-grid">
          <div><span>Speed</span><strong id="speedStat">0.00/s</strong></div>
          <div><span>Seen</span><strong id="seenListingsStat">0</strong></div>
          <div><span>Avg Rating</span><strong id="avgRatingStat">-</strong></div>
          <div><span>Avg Reviews</span><strong id="avgReviewsStat">-</strong></div>
        </div>
        <div class="metrics-grid metrics-grid-3">
          <div><span>Site Pages Visited</span><strong id="crawlVisitedStat">0</strong></div>
          <div><span>Site Pages Found</span><strong id="crawlDiscoveredStat">0</strong></div>
          <div><span>Social Pages Scanned</span><strong id="socialScannedStat">0</strong></div>
        </div>
        <div class="metrics-grid metrics-grid-kpi">
          <div><span>Emails Found</span><strong id="emailsFoundStat">0</strong></div>
          <div><span>Discovery Emails</span><strong id="discoveryEmailsFoundStat">0</strong></div>
        </div>
        <p id="stateText">Idle</p>
        <p id="leadSignalText" class="lead-signal"></p>
        <p id="errorText" class="error"></p>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
